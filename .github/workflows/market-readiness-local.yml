name: Tixmo Market Readiness Local Gates

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/market-readiness-local.yml'
      - 'package.json'
      - 'scripts/**'
      - 'tdash/**'
      - 'tixmoapi2/**'
  push:
    branches:
      - main
      - master
    paths:
      - '.github/workflows/market-readiness-local.yml'
      - 'package.json'
      - 'scripts/**'
      - 'tdash/**'
      - 'tixmoapi2/**'

jobs:
  local-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://tixmo:tixmo_dev_password@localhost:5432/tixmoapi?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci_jwt_secret_32_chars_minimum_value
      JWT_REFRESH_SECRET: ci_refresh_secret_32_chars_minimum
      SESSION_SECRET: ci_session_secret_32_chars_minimum
      STRIPE_SECRET_KEY: sk_test_market_readiness
      STRIPE_WEBHOOK_SECRET: whsec_market_readiness
      PAYMENT_CURRENCY: usd
      ADMIN_EMAIL: ci-admin@tixmo.test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            tixmoapi2/package-lock.json
            tdash/package-lock.json

      - name: Install API dependencies
        run: npm ci --prefix tixmoapi2

      - name: Install dashboard dependencies
        run: npm ci --prefix tdash

      - name: Run market readiness gates
        run: npm run verify:market

